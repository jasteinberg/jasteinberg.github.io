---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <nav class="post-toc" id="post-toc" aria-label="Table of contents">
    <div class="post-toc-label">On this page</div>
    <div class="post-toc-list" id="post-toc-list"></div>
  </nav>

  <div class="post-main">
    <header class="post-header">
      <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
      <p class="post-meta">
        <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
          {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
          {{ page.date | date: date_format }}
        </time>
        {%- if page.author -%}
          • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">{{ page.author }}</span></span>
        {%- endif -%}</p>
    </header>

    <div class="post-content e-content" itemprop="articleBody">
      {{ content }}
    </div>

    <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
  </div>
</article>

<script>
(function(){
  var content = document.querySelector('.post-content');
  var nav = document.getElementById('post-toc');
  var list = document.getElementById('post-toc-list');
  if(!content || !nav || !list){ return; }
  var hs = content.querySelectorAll('h2, h3');
  if(hs.length < 3){ nav.remove(); return; }
  var links = {};
  hs.forEach(function(h){
    if(!h.id){ h.id = h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-'); }
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'post-toc-a' + (h.tagName === 'H3' ? ' sub' : '');
    list.appendChild(a);
    links[h.id] = a;
  });
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        for(var k in links){ links[k].classList.remove('active'); }
        if(links[e.target.id]){ links[e.target.id].classList.add('active'); }
      }
    });
  }, { rootMargin: '0px 0px -78% 0px', threshold: 0 });
  hs.forEach(function(h){ obs.observe(h); });
})();
</script>
